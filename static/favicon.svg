<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#e11d74"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e"/>
  <!-- Stem -->
  <path d="M32 48 Q30 40 32 32" stroke="url(#leaf)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M31 42 Q24 38 22 44 Q26 42 31 42Z" fill="url(#leaf)"/>
  <path d="M33 40 Q40 36 42 42 Q38 40 33 40Z" fill="url(#leaf)"/>
  <!-- Petals -->
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="url(#petal)" transform="rotate(0 32 30)"/>
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="url(#petal)" transform="rotate(60 32 30)"/>
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="url(#petal)" transform="rotate(120 32 30)"/>
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="url(#petal)" transform="rotate(180 32 30)"/>
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="url(#petal)" transform="rotate(240 32 30)"/>
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="url(#petal)" transform="rotate(300 32 30)"/>
  <!-- Center -->
  <circle cx="32" cy="30" r="5" fill="#fbbf24"/>
  <circle cx="32" cy="30" r="3" fill="#f59e0b"/>
</svg>
